<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点将台 · AgentTeam Studio</title>
<style>
  :root {
    --bg: #131418; --panel: #1b1d23; --panel-2: #22252c; --line: #2c2f37;
    --text: #e9e5db; --dim: #918b7c; --faint: #5d594f;
    --accent: #e0a64b; --accent-dim: #8a6526;
    --content-w: 1120px;
    --green: #8fbf77; --red: #d97862; --blue: #7da9c7;
    --sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --serif: "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
    --mono: "SF Mono", "Menlo", "JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: rgba(224,166,75,.34) transparent; }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-thumb { background: rgba(224,166,75,.34); border-radius: 99px; }
  *::-webkit-scrollbar-track { background: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
    min-height: 100vh; line-height: 1.65;
  }
  .wrap { max-width: 1480px; margin: 0 auto; padding: 0 28px 120px; }

  header { padding: 44px 0 6px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  h1 { font-family: var(--serif); font-size: 40px; font-weight: 700; letter-spacing: 2px; }
  h1 .blade { color: var(--accent); }
  .tagline { color: var(--dim); font-size: 15px; }
  .sub { color: var(--faint); font-size: 12px; font-family: var(--mono); margin-bottom: 28px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 20px; }

  textarea, input[type=text] {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px;
    font-size: 14px; font-family: inherit; resize: vertical; line-height: 1.7;
  }
  textarea:focus, input[type=text]:focus { outline: none; border-color: var(--accent-dim); }
  #desc { min-height: 80px; font-size: 16px; }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .chip {
    font-size: 13px; color: var(--dim); border: 1px solid var(--line);
    border-radius: 99px; padding: 4px 14px; cursor: pointer; background: none; transition: all .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .chip:hover { color: var(--accent); border-color: var(--accent-dim); }
  .chip .x { color: var(--faint); font-size: 12px; padding: 0 2px; }
  .chip .x:hover { color: var(--red); }

  .actions { margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-size: 14px; padding: 9px 24px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--accent-dim); background: var(--accent); color: #1a1408;
    font-weight: 600; letter-spacing: 1px; transition: all .15s;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.1); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn.ghost { background: none; color: var(--dim); border-color: var(--line); font-weight: 400; }
  .btn.ghost:hover:not(:disabled) { color: var(--text); border-color: var(--faint); filter: none; }
  .btn.danger { background: none; color: var(--red); border-color: #5a3a32; font-weight: 400; }

  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.3); border-top-color: #1a1408; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error { display: none; position: relative; margin-top: 14px; color: var(--red); font-size: 14px;
    border-left: 3px solid var(--red); padding-left: 12px; white-space: pre-wrap; word-break: break-word;
    max-height: 360px; overflow: auto; }
  #error .err-more { color: var(--accent); text-decoration: underline; cursor: help; font-size: 12.5px; white-space: nowrap; }
  #error .err-full { display: none; position: absolute; left: 0; right: 0; top: 100%; z-index: 60; margin-top: 6px;
    background: #2a1d1d; border: 1px solid #5a3a32; border-radius: 8px; padding: 11px 13px; color: var(--text);
    white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; font-size: 12.5px; line-height: 1.65;
    box-shadow: 0 14px 36px rgba(0,0,0,.55); }
  #error:hover .err-full { display: none; }

  #saved-bar { margin-top: 14px; display: none; }
  #saved-bar .lab { font-size: 12px; color: var(--faint); font-family: var(--mono); letter-spacing: .12em; margin-bottom: 6px; }

  /* ===== 工作台：左右双栏 ===== */
  #team { display: none; margin-top: 36px; }
  .workspace { display: grid; grid-template-columns: 470px minmax(0,1fr); gap: 26px; align-items: start; }
  .left-col { position: sticky; top: 18px; display: flex; flex-direction: column; gap: 16px; }
  @media (max-width: 1100px) { .workspace { grid-template-columns: 1fr; } .left-col { position: static; } }

  .team-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .team-head h2 { font-family: var(--serif); font-size: 26px; }
  .team-head .emoji { font-size: 26px; }
  #save-state { font-size: 11px; color: var(--faint); font-family: var(--mono); }
  .team-summary { color: var(--dim); font-size: 13px; margin-top: 6px; }

  /* 作战室（纵向层级） */
  #board {
    position: relative; border: 1px solid var(--line); border-radius: 12px;
    background:
      radial-gradient(ellipse at 50% -20%, rgba(224,166,75,.06), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 35px, rgba(255,255,255,.025) 35px 36px),
      repeating-linear-gradient(90deg, transparent 0 35px, rgba(255,255,255,.025) 35px 36px),
      var(--panel);
    overflow: hidden;
  }
  #board svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .edge { fill: none; stroke: #34373f; stroke-width: 1.5; stroke-dasharray: 5 6; opacity: .85; transition: stroke .4s; }
  .edge.active { stroke: var(--accent); stroke-width: 2.5; stroke-dasharray: none; filter: drop-shadow(0 0 4px rgba(224,166,75,.6)); }

  .node { position: absolute; width: 104px; margin-left: -52px; text-align: center; transition: transform .3s; cursor: pointer; }
  /* 只用 emoji 本身做图标，不再套圆圈容器 */
  .avatar {
    height: 42px; margin: 0 auto; display: flex; align-items: center; justify-content: center;
    font-size: 34px; line-height: 1; transition: transform .3s;
  }
  .node-name { font-size: 11px; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node.running .avatar { animation: nodepulse 1.2s ease-in-out infinite; }
  @keyframes nodepulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(224,166,75,0)); }
    50% { transform: scale(1.16); filter: drop-shadow(0 0 7px rgba(224,166,75,.65)); }
  }
  .node.done .avatar { filter: none; }
  .node.done .badge { display: flex; animation: pop .3s ease-out; }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }

  .bubble {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    max-width: 190px; min-width: 50px; background: #26292f; border: 1px solid #3a3e47;
    border-radius: 9px; padding: 4px 10px; font-size: 11px; color: #cdc8bb;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 3;
  }
  .bubble.show { opacity: 1; }
  .bubble .dots::after { content: "…"; animation: dots 1.2s steps(4) infinite; }
  .chat-bubble .dots::after { content: "…"; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
  .fly { position: absolute; font-size: 15px; z-index: 4; pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
  .wave-tag { position: absolute; left: 10px; font-size: 9px; color: var(--faint); font-family: var(--mono); letter-spacing: .15em; }

  /* 出征区（左栏） */
  #task { min-height: 64px; font-size: 13px; }
  .runbar-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .runbar-hint { font-size: 12px; color: var(--faint); min-width: 0; }
  .run-indicators { display: flex; align-items: center; justify-content: flex-end; gap: 7px; flex-wrap: wrap; }
  .orch-status { display: none; margin-left: 0; width: fit-content; max-width: 100%; flex: none; }
  .orch-status.show { display: inline-flex; align-items: center; }
  #danger-chip { display: none; border: 1px solid rgba(217,120,98,.42); background: rgba(217,120,98,.1);
    color: #efb1a4; border-radius: 999px; padding: 2px 9px; font-size: 11px; cursor: pointer; }
  #danger-chip.show { display: inline-flex; align-items: center; gap: 4px; }

  /* ===== 右栏：成员与产出 ===== */
  .members-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .members-head .t { font-family: var(--mono); font-size: 12px; letter-spacing: .2em; color: var(--faint); }

  /* 成员网格：一排两个（连续排布，层级收成卡片小标签） */
  #members { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  #members.fill { grid-auto-rows: 1fr; } /* 右栏偏短时拉伸补齐，与左栏对齐 */
  .wave-chip { flex: none; font-family: var(--mono); font-size: 10px; color: var(--faint);
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 7px; letter-spacing: .08em; }
  .wave-chip.front { color: var(--blue); border-color: #2d3a44; }
  .wave-chip.sink { color: var(--accent); border-color: var(--accent-dim); }

  .agent { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; transition: border-color .3s; }
  .agent.editing { grid-column: 1 / -1; }
  .agent:hover { border-color: var(--faint); }
  .agent.running { border-color: var(--accent-dim); }
  .agent.done { border-color: #3d4a36; }
  .agent-top { display: flex; align-items: center; gap: 9px; }
  .agent-top .emoji { font-size: 22px; }
  .agent-name { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-risk { border: 1px solid rgba(217,120,98,.42); background: rgba(217,120,98,.1);
    color: #efb1a4; border-radius: 999px; padding: 1px 7px; font-size: 10.5px; cursor: pointer; flex: none; }
  .member-risk:hover { border-color: rgba(217,120,98,.7); background: rgba(217,120,98,.16); }
  .agent-role { color: var(--dim); font-size: 12.5px; margin-top: 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .edit-btn { background: none; border: 1px solid var(--line); color: var(--faint); border-radius: 6px;
    font-size: 12px; padding: 2px 8px; cursor: pointer; flex: none; }
  .edit-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
  .meta-row { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    font-size: 11px; color: var(--faint); }
  .model-pick { display: inline-flex; align-items: center; gap: 3px; font-size: 10.5px; color: var(--dim); }
  .model-sel { font-family: var(--mono); font-size: 10.5px; color: var(--dim);
    background: rgba(150,150,160,.12); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 4px; max-width: 200px; cursor: pointer; }
  .model-sel.custom { background: rgba(170,140,255,.14); color: #c3b0ff; border-color: rgba(170,140,255,.32); }
  .model-sel:hover { border-color: var(--faint); }
  #design-model-wrap { align-self: center; font-size: 12px; color: var(--faint); }
  #design-model-wrap .model-sel { font-size: 12px; max-width: 240px; }
  /* 团队主模型（左栏团队头部） */
  #team-main-model { margin-top: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #team-main-model .tmm-label { font-size: 12px; color: var(--dim); }
  #team-main-model .model-sel { font-size: 12px; max-width: 240px; }
  #team-main-model .tmm-note { font-size: 11px; color: var(--faint); }
  .actual-model { font-family: var(--mono); font-size: 10.5px; color: #9ec1ff; background: rgba(120,170,255,.1);
    border: 1px solid rgba(120,170,255,.24); border-radius: 5px; padding: 1px 6px; }
  /* 配置中心弹窗 */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100;
    display: flex; align-items: flex-start; justify-content: center; padding: 60px 16px; overflow:auto; }
  /* 思考过程 / 人工确认：毛玻璃大弹窗 */
  .status.thinkable { cursor: pointer; text-decoration: underline dotted; }
  .think-mask { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 40px 20px;
    background: rgba(20,18,16,.45); backdrop-filter: blur(14px) saturate(1.1); -webkit-backdrop-filter: blur(14px) saturate(1.1); }
  .think-box { width: 760px; max-width: 100%; max-height: 82vh; display: flex; flex-direction: column;
    background: rgba(34,37,43,.82); border: 1px solid rgba(255,255,255,.14); border-radius: 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6); }
  .think-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px;
    font-family: var(--serif); font-size: 18px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .think-x { background: none; border: none; color: var(--faint); font-size: 20px; cursor: pointer; }
  .think-chat { padding: 18px 22px; overflow: auto; flex: 1; min-height: 260px; overscroll-behavior: contain;
    display: flex; flex-direction: column; gap: 13px; }
  .chat-row { display: flex; gap: 10px; align-items: flex-start; }
  .chat-row.user { justify-content: flex-end; }
  .chat-avatar { width: 34px; height: 34px; border-radius: 11px; flex: none; display: grid; place-items: center;
    font-weight: 700; font-size: 15px; box-shadow: 0 8px 22px rgba(0,0,0,.24); overflow: hidden; }
  .chat-avatar.model { background: linear-gradient(135deg, rgba(224,166,75,.22), rgba(255,255,255,.08));
    border: 1px solid rgba(224,166,75,.34); color: #f3d49a; }
  .chat-avatar.user { background: var(--accent); border: 1px solid rgba(255,255,255,.18); color: #1d160a; }
  .chat-stack { min-width: 0; max-width: min(78%, 660px); display: flex; flex-direction: column; }
  .chat-row.user .chat-stack { align-items: flex-end; }
  .chat-name { margin: 0 0 4px 2px; color: var(--faint); font-size: 11.5px; }
  .chat-bubble { border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 10px 14px;
    color: #e9e4da; font-size: 14px; line-height: 1.75; word-break: break-word; white-space: pre-wrap;
    background: rgba(25,27,32,.72); box-shadow: 0 10px 28px rgba(0,0,0,.18); }
  .chat-bubble .md-render { white-space: normal; }
  .chat-row.model .chat-bubble { border-radius: 10px; }
  .chat-row.user .chat-bubble { min-width: 120px; border-radius: 10px; background: rgba(224,166,75,.16); border-color: var(--accent-dim); color: var(--text); }
  .chat-bubble.ask { background: rgba(170,140,255,.12); border-color: rgba(170,140,255,.42); color: #eadfff; }
  .chat-bubble.output { background: rgba(14,16,20,.48); border-color: rgba(224,166,75,.24); }
  .chat-bubble.original { max-height: 280px; overflow: auto; background: rgba(0,0,0,.2); }
  .chat-title { margin-bottom: 8px; color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing: .08em; }
  .chat-tag { display: inline-block; margin-top: 5px; font-size: 10.5px; font-family: var(--mono); letter-spacing: .04em; }
  .chat-tag.wait { color: var(--accent); }
  .chat-tag.work { color: #7ab8ff; }
  .chat-tag.ok { color: #8fcaa0; }
  .chat-tag.err { color: #e08a8a; }
  .stream-caret { display: inline-block; width: 7px; height: 1em; margin-left: 4px; vertical-align: -2px;
    background: var(--accent); border-radius: 2px; animation: caretBlink 1s step-end infinite; }
  @keyframes caretBlink { 50% { opacity: .18; } }
  /* 统一思考对话框的常驻底部输入区 */
  .think-foot { border-top: 1px solid rgba(255,255,255,.12); padding: 12px 22px; background: rgba(170,140,255,.06); }
  .think-foot textarea { width: 100%; min-height: 58px; background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.16);
    border-radius: 9px; color: var(--text); padding: 9px 11px; font-size: 14px; margin-bottom: 8px; resize: vertical; }
  .think-foot-row { display: flex; align-items: center; gap: 10px; }
  .think-hint { font-size: 12px; color: var(--faint); }
  .voice-btn { width: 38px; height: 34px; border-radius: 10px; border: 1px solid var(--line);
    background: rgba(0,0,0,.2); color: var(--dim); cursor: pointer; font-size: 15px; }
  .voice-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
  .voice-btn.listening { color: #f1d19a; border-color: var(--accent); background: rgba(224,166,75,.16);
    box-shadow: 0 0 0 3px rgba(224,166,75,.12); }
  .ai-edit-row { display: flex; gap: 6px; }
  .ai-edit-input { flex: 1; background: #15171c; border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 6px 9px; font-size: 12.5px; }
  .ai-edit-go { flex: none; font-size: 12px; padding: 5px 12px; }
  .ai-edit-msg { font-size: 11.5px; color: var(--faint); margin-top: 5px; }
  /* 待确认入口：确认窗被手动关闭后仍能回到回答处 */
  .ask-reopen { position: fixed; right: 20px; bottom: 20px; z-index: 150; cursor: pointer;
    background: rgba(170,140,255,.16); color: #e3d6ff; border: 1px solid rgba(170,140,255,.45);
    border-radius: 20px; padding: 9px 16px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    animation: askPulse 1.8s ease-in-out infinite; }
  @keyframes askPulse { 0%,100% { box-shadow: 0 8px 24px rgba(0,0,0,.4); } 50% { box-shadow: 0 0 0 4px rgba(170,140,255,.18); } }
  /* 作战蓝图面板（Artifacts 风） */
  #blueprint { margin-top: 16px; }
  .bp-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bp-head h3 { font-family: var(--serif); font-size: 20px; }
  .bp-head .bp-sub { color: var(--faint); font-size: 12.5px; }
  .bp-goal { font-size: 15px; line-height: 1.7; color: #f0eadd; background: rgba(224,166,75,.07);
    border-left: 3px solid var(--accent-dim); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 18px; }
  .bp-sec { margin-bottom: 18px; }
  .bp-sec > .bp-t { font-family: var(--mono); font-size: 11.5px; letter-spacing: .12em; color: var(--accent);
    border-bottom: 1px solid var(--line); padding-bottom: 5px; margin-bottom: 11px; }
  .bp-task { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px; margin-bottom: 9px; }
  .bp-task .tt { font-weight: 600; font-size: 14px; color: var(--text); }
  .bp-task .td { font-size: 13px; color: var(--dim); line-height: 1.6; margin-top: 3px; }
  .bp-task .ta { font-size: 12px; color: #8fcaa0; margin-top: 6px; }
  .bp-task .ta b { color: #6fae84; font-weight: 600; }
  .bp-tool { display: inline-flex; align-items: baseline; gap: 6px; background: rgba(120,170,255,.1);
    border: 1px solid rgba(120,170,255,.26); border-radius: 6px; padding: 4px 10px; margin: 0 6px 6px 0; font-size: 12.5px; color: #9ec1ff; }
  .bp-tool .why { color: var(--dim); font-size: 11.5px; }
  .bp-plat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 12px 14px; margin-bottom: 10px; }
  .bp-plat .cap { font-size: 13px; color: var(--dim); margin-bottom: 6px; }
  .bp-plat .cap b { color: var(--text); }
  .bp-plat .pick { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .bp-plat select { background: #15171c; border: 1px solid var(--accent-dim); color: var(--text);
    border-radius: 7px; padding: 5px 9px; font-size: 13px; }
  .bp-plat .why { font-size: 12px; color: var(--faint); margin-top: 7px; line-height: 1.6; }
  .bp-plat .keyrow { display: flex; gap: 6px; align-items: center; margin-top: 9px; }
  .bp-plat .keyrow label { font-family: var(--mono); font-size: 11.5px; color: var(--accent); flex: none; }
  .bp-plat .keyrow input { flex: 1; background: #15171c; border: 1px solid var(--line); color: var(--text);
    border-radius: 7px; padding: 6px 9px; font-size: 12.5px; font-family: var(--mono); }
  .bp-q { background: rgba(170,140,255,.08); border: 1px solid rgba(170,140,255,.22); border-radius: 9px; padding: 11px 13px; margin-bottom: 9px; }
  .bp-q .q { font-size: 13.5px; color: #e3d6ff; }

  }
  .side-nav-item.active { color: var(--text); background: rgba(224,166,75,.1); }

  .history-list { overflow: auto; padding: 0 10px 20px; display: grid; gap: 10px; }
  .history-item {
    border: 0; width: 100%; text-align: left; background: transparent; border-radius: 12px;
    display: grid; grid-template-columns: 42px 1fr; gap: 10px; padding: 7px 8px; cursor: pointer; color: var(--text);
  }
  .history-item:hover { background: rgba(224,166,75,.07); }
  .history-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--panel-2); display: grid; place-items: center; font-size: 20px; }
  .history-item > span:last-child { min-width: 0; }
  .history-name { display: block; color: var(--text); font-size: 13px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta { display: block; color: var(--faint); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-empty, .team-empty { color: var(--faint); font-size: 13px; padding: 12px; text-align: center; }

  .wrap { max-width: 1380px; width: 100%; padding: 22px 24px 110px; }
  header { display: none; }
  .sub { display: none; }
  .home-topbar { display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-height: 44px; }
  .hero {
    min-height: 455px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 42px 18px 28px;
  }
  .hero-title { font-size: clamp(30px, 3.3vw, 50px); color: var(--text); font-weight: 300; letter-spacing: .04em; text-shadow: 0 2px 20px rgba(0,0,0,.45); }
  .hero-subtitle { margin-top: 12px; color: var(--dim); font-size: 14px; letter-spacing: .12em; }
  .create-tabs { margin-top: 34px; padding: 4px; border-radius: 28px; background: rgba(34,37,44,.92); border: 1px solid var(--line); display: inline-flex; gap: 4px; box-shadow: 0 12px 36px rgba(0,0,0,.2); }
  .create-tab { border: 0; border-radius: 24px; padding: 8px 18px; background: transparent; color: var(--dim); font-size: 14px; }
  .create-tab.active { color: #1a1408; background: var(--accent); }

  .prompt-card {
    width: min(var(--content-w), 100%); margin-top: 16px; padding: 13px 14px 14px;
    background: rgba(27,29,35,.96); border: 1px solid var(--line); border-radius: 26px;
    box-shadow: 0 22px 70px rgba(0,0,0,.32);
  }
  #desc {
    min-height: 66px; max-height: 190px; border: 0; background: transparent; color: var(--text);
    font-size: 15px; padding: 4px 6px 8px; resize: vertical;
  }
  #desc::placeholder { color: var(--faint); }
  #desc:focus { border-color: transparent; box-shadow: none; }
  .prompt-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-top: 8px; border-top: 1px solid var(--line); }
  .prompt-tools { display: flex; align-items: center; gap: 9px; color: var(--dim); font-size: 13px; flex-wrap: wrap; }
  .round-tool {
    height: 32px; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 16px;
    padding: 0 13px; background: var(--panel-2); color: var(--dim); font-size: 13px; cursor: pointer;
  }
  .round-tool:hover { color: var(--accent); border-color: var(--accent-dim); }
  .send-dot {
    width: 38px; height: 38px; display: grid; place-items: center; border: 0; border-radius: 50%;
    background: var(--accent); color: #1a1408; font-size: 19px; cursor: pointer;
  }
  .send-dot:hover { background: #efba65; filter: none; }
  .hero-model-row { margin-top: 15px; display: flex; justify-content: center; }
  #design-model-wrap {
    align-self: auto; min-height: 34px; padding: 6px 12px; border-radius: 20px;
    background: rgba(34,37,44,.92); border: 1px solid var(--line); color: var(--dim);
    box-shadow: 0 8px 26px rgba(0,0,0,.18); font-size: 13px;
  }
  #design-model-wrap .model-sel {
    max-width: 260px; border: 0; background: transparent; color: var(--text); font-size: 12px; padding: 0 3px;
  }
  /* 军师模型自定义弹层 */
  #design-model-wrap.mp { position: relative; padding: 0; background: none; border: 0; box-shadow: none; }
  .mp-trigger { display: inline-flex; align-items: center; gap: 4px; min-height: 34px; padding: 6px 14px; border-radius: 20px;
    background: rgba(34,37,44,.92); border: 1px solid var(--line); color: var(--dim); font-size: 13px; cursor: pointer; box-shadow: 0 8px 26px rgba(0,0,0,.18); }
  .mp-trigger:hover { border-color: var(--accent-dim); color: var(--text); }
  .mp-trigger b { color: var(--text); font-weight: 600; }
  .mp-caret { color: var(--faint); font-size: 11px; }
  .mp-pop { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); z-index: 90; width: 360px; max-width: 86vw;
    max-height: 60vh; overflow: auto; text-align: left; background: #1d1f25; border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5); padding: 8px; }
  .mp-pop[hidden] { display: none; }
  .mp-title { font-size: 12px; color: var(--faint); font-family: var(--mono); letter-spacing: .08em; padding: 8px 10px 6px; }
  .mp-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 11px; border-radius: 10px; cursor: pointer; }
  .mp-item:hover { background: rgba(255,255,255,.05); }
  .mp-item.sel { background: rgba(224,166,75,.12); }
  .mp-ico { font-size: 15px; line-height: 1.4; flex: none; opacity: .8; }
  .mp-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .mp-name { font-size: 14px; color: var(--text); font-weight: 600; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; word-break: break-all; }
  .mp-desc { font-size: 12px; color: var(--dim); line-height: 1.5; }
  .mp-badge { font-size: 10.5px; padding: 1px 7px; border-radius: 10px; font-weight: 500; flex: none;
    background: rgba(255,255,255,.1); color: var(--dim); }
  .mp-badge.think { background: rgba(111,174,132,.18); color: #8fcaa0; }
  .mp-badge.sub { background: rgba(170,140,255,.18); color: #c3b0ff; }
  .mp-badge.api { background: rgba(224,166,75,.18); color: var(--accent); }
  .mp-badge.bl { background: rgba(120,170,255,.18); color: #9ec1ff; }
  .mp-check { color: var(--accent); flex: none; align-self: center; }
  .hero-actions { margin-top: 14px; justify-content: center; }
  #btn-design {
    flex: none; width: 38px; min-width: 38px; height: 38px; padding: 0; border-radius: 50%;
    background: var(--accent); border-color: var(--accent-dim); color: #1a1408;
  }
  #btn-design:hover:not(:disabled) { background: #efba65; border-color: var(--accent); }
  #btn-design:disabled { background: var(--accent); border-color: var(--accent-dim); }
  #btn-import-skill { border-radius: 18px; background: var(--panel-2); color: var(--text); border-color: var(--line); }
  #design-hint { display: inline-flex; align-items: center; min-height: 24px; }
  #imported-skills { width: min(var(--content-w), 100%); margin: 10px auto 0; justify-content: center; }
  #error { position: fixed; top: 18px; left: calc(50% + var(--side-w, 260px) / 2); transform: translateX(-50%); z-index: 200; width: min(560px, calc(100vw - 32px));
    margin: 0; background: rgba(42,29,29,.97); border-radius: 14px; padding: 13px 20px; cursor: pointer;
    box-shadow: 0 18px 48px rgba(0,0,0,.55); backdrop-filter: blur(8px); text-align: center; font-size: 14.5px; }

  #saved-bar {
    display: none; margin: 2px auto 0; width: min(var(--content-w), 100%); max-width: var(--content-w); padding: 0; background: transparent; border: 0;
  }
  .team-section-title { display: flex; align-items: center; justify-content: space-between; margin: 0 0 13px; color: var(--text); font-weight: 720; }
  .team-section-title .muted { color: var(--faint); font-weight: 500; font-size: 12px; }
  .all-teams-panel {
    margin-top: 0; border-radius: 28px; background: rgba(27,29,35,.72); border: 1px solid var(--line);
    padding: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  #saved-chips {
    margin-top: 0; max-height: 500px; overflow: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 14px; padding: 2px 4px 8px;
  }
  .team-card {
    position: relative; min-height: 82px; border: 1px solid var(--line); border-radius: 18px;
    background: rgba(27,29,35,.94); box-shadow: 0 10px 28px rgba(0,0,0,.18);
    padding: 12px 42px 12px 12px; display: grid; grid-template-columns: 46px minmax(0, 1fr); gap: 11px;
    text-align: left; color: var(--text); cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .team-card.has-members { grid-template-columns: 46px minmax(160px, 230px) 132px; justify-content: start; }
  .team-card:hover { transform: translateY(-2px); border-color: var(--accent-dim); box-shadow: 0 18px 38px rgba(0,0,0,.28); }
  .team-avatar { width: 46px; height: 46px; border-radius: 15px; background: linear-gradient(135deg, #262a33, #1f2229); display: grid; place-items: center; font-size: 23px; }
  .team-card-main { min-width: 0; align-self: center; }
  .team-origin-wrap { position: static; display: block; min-width: 0; }
  .team-card-name { display: inline-block; max-width: 100%; color: var(--text); font-weight: 720; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: top; }
  .team-card-meta { display: block; margin-top: 2px; color: var(--dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-card-status { display: flex; align-items: center; gap: 4px; margin-top: 7px; color: var(--faint); font-size: 11px; }
  .team-member-icons {
    align-self: center; justify-self: start; display: flex; flex-wrap: wrap; justify-content: flex-start; align-content: center;
    gap: 6px; max-width: 132px; min-width: 0; overflow: visible;
  }
  .team-member-icon {
    position: relative; width: 25px; height: 25px; border-radius: 9px; display: grid; place-items: center;
    background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.07); font-size: 15px; line-height: 1;
  }
  .team-member-icon:hover {
    border-color: rgba(224,166,75,.34); background: rgba(224,166,75,.12); z-index: 5;
  }
  .team-hover-tip {
    position: fixed; z-index: 10000; display: none; max-width: min(380px, calc(100vw - 32px)); max-height: min(300px, calc(100vh - 32px)); overflow: auto;
    white-space: pre-wrap; word-break: break-word; line-height: 1.58; color: var(--text); font-size: 12.5px;
    padding: 12px 13px; border-radius: 16px; border: 1px solid rgba(224,166,75,.28);
    background: rgba(27,29,35,.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 24px 64px rgba(0,0,0,.58); pointer-events: auto;
  }
  .team-hover-tip.show { display: block; }
  .team-hover-tip.member {
    max-width: 220px; max-height: 140px; white-space: nowrap; overflow: auto;
    padding: 7px 10px; border-radius: 12px; font-weight: 600;
  }
  .team-hover-tip.dag, .team-hover-tip.error {
    max-width: min(520px, calc(100vw - 32px));
    max-height: min(360px, calc(100vh - 32px));
    overflow-y: scroll;
    scrollbar-gutter: stable;
    white-space: normal;
  }
  .team-del {
    position: absolute; top: 10px; right: 10px; width: 25px; height: 25px; border-radius: 50%;
    border: 1px solid var(--line); background: rgba(34,37,44,.86); color: var(--faint); cursor: pointer;
    display: grid; place-items: center; line-height: 1; padding: 0; font-size: 15px;
  }
  .team-del:hover { color: var(--red); border-color: rgba(207,105,90,.28); }
  .team-load-tip { padding: 8px 0 0; color: var(--faint); font-size: 12px; text-align: center; }

  .card {
    background: rgba(27,29,35,.88); border-color: var(--line); border-radius: 22px;
    box-shadow: 0 16px 52px rgba(0,0,0,.24);
  }
  .btn { border-radius: 16px; }
  .btn.ghost { background: rgba(34,37,44,.82); color: var(--dim); border-color: var(--line); }
  textarea, input[type=text] { background: var(--panel-2); color: var(--text); border-color: var(--line); }
  .model-sel { background: rgba(34,37,44,.82); color: var(--dim); border-color: var(--line); }
  #blueprint { width: min(var(--content-w), 100%); max-width: var(--content-w); margin: 18px auto 0; }
  #team { width: min(var(--content-w), 100%); max-width: var(--content-w); margin: 34px auto 0; }
  .modal-mask { background: rgba(0,0,0,.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

  @media (max-width: 1180px) {
    .app-shell { --side-w: 0px; grid-template-columns: 1fr; }
    .app-shell.sidebar-collapsed .history-sidebar { display: none; }
    .history-sidebar { position: relative; height: auto; border-radius: 0 0 22px 22px; flex-direction: row; align-items: flex-start; overflow-x: auto; }
    .side-nav { min-width: 180px; }
    .history-list { grid-auto-flow: column; grid-auto-columns: 220px; overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; }
    #saved-chips { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 760px) {
    .wrap { padding: 14px 12px 80px; }
    .history-sidebar { display: none; }
    .hero { min-height: 390px; padding-top: 26px; }
    .prompt-toolbar { align-items: flex-start; flex-direction: column; }
    .send-dot { align-self: flex-end; }
    #saved-chips { grid-template-columns: 1fr; max-height: none; }
    .team-card.has-members { grid-template-columns: 46px minmax(0, 1fr); }
    .team-member-icons { display: none; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="history-sidebar">
    <div class="side-brand">
      <div class="brand-mark"><span class="brand-dot">将</span><span>点将台</span></div>
      <button class="side-collapse" id="side-collapse" type="button" title="折叠侧栏" aria-label="折叠侧栏">◱</button>
    </div>
    <nav class="side-nav" aria-label="点将台导航">
      <div class="side-nav-item" data-open-config>⚙ 系统配置</div>
      <div class="side-nav-item" id="battle-dashboard-link">📊 战损看板</div>
    </nav>
    <div class="history-head"><span>我的历史执行记录</span><button id="history-refresh" type="button">刷新</button></div>
    <div class="history-list" id="history-list"><div class="history-empty">暂无历史记录</div></div>
    <div class="side-resizer" id="side-resizer" title="拖动调节侧栏宽度"></div>
  </aside>

  <main class="wrap">
    <div class="home-topbar">
      <button id="side-reopen" type="button" title="展开侧栏" aria-label="展开侧栏">◰</button>
    </div>

    <section class="hero">
      <h1 class="hero-title">Hi，和点将台一起调兵遣将</h1>
      <div class="hero-subtitle">把想法交给将军，组队、协作、出征</div>

      <div class="prompt-card">
        <textarea id="desc" placeholder="描述你想完成的事。点将台会先想清楚、出一份作战蓝图，确认后再组队出征。"></textarea>
        <div class="prompt-toolbar">
          <div class="prompt-tools">
            <button class="round-tool" id="btn-import-skill" type="button" title="导入已有 Skill 来拆分成团队">＋ 导入 Skill</button>
            <div class="model-pick mp" id="design-model-wrap" title="点将（设计团队）用的军师模型，可独立切换">
              <button type="button" class="mp-trigger" id="mp-trigger">🧠 军师模型：<b id="mp-current">默认</b> <span class="mp-caret">⌄</span></button>
              <div class="mp-pop" id="mp-pop" hidden></div>
              <select id="design-model" class="model-sel" style="display:none"></select>
            </div>
          </div>
          <button class="send-dot" id="btn-design" type="button" title="点将（生成作战蓝图）">↑</button>
        </div>
      </div>
      <div class="actions hero-actions">
        <span id="design-hint" style="color:var(--faint);font-size:13px"></span>
      </div>
      <div id="imported-skills"></div>
      <div id="error"></div>
    </section>

    <section id="saved-bar">
      <div class="all-teams-panel">
        <div class="team-section-title">所有团队 <span class="muted" id="all-teams-count">向下滚动加载更多</span></div>
        <div class="chips" id="saved-chips"></div>
        <div class="team-load-tip" id="team-load-tip"></div>
      </div>
    </section>

    <section class="card" id="battle-dashboard">
      <div class="battle-dashboard-head">
        <div class="battle-dashboard-title">
          <h3>战损看板</h3>
          <p>按历史出征记录查看总 token、总时长、成员消耗与每一步明细。</p>
        </div>
        <button class="btn ghost" id="battle-dashboard-refresh" type="button">刷新</button>
      </div>
      <div class="battle-dashboard-grid">
        <div class="battle-run-list" id="battle-run-list">
          <div class="battle-detail-empty">正在读取战损记录…</div>
        </div>
        <div class="battle-detail">
          <div class="battle-detail-empty" id="battle-detail-empty">选择左侧一条出征记录查看分层消耗。</div>
          <div id="battle-report">
            <div class="battle-head">
              <h3>分层消耗</h3>
              <span class="battle-meta" id="battle-meta"></span>
            </div>
            <div class="battle-summary">
              <div class="battle-kpi"><div class="k">总 Token</div><div class="v" id="battle-total-tokens">未回传</div></div>
              <div class="battle-kpi"><div class="k">总作战时长</div><div class="v" id="battle-total-duration">--</div></div>
              <div class="battle-kpi"><div class="k">成员 / 步骤</div><div class="v" id="battle-total-steps">--</div></div>
            </div>
            <div class="battle-members" id="battle-members"></div>
          </div>
        </div>
      </div>
    </section>

  <!-- 作战蓝图：勘察阶段产物，确认后才点兵 -->
  <div class="card" id="blueprint" style="display:none">
    <div class="bp-head">
      <h3>🗺 作战蓝图</h3>
      <span class="bp-sub">先把这件事想清楚，确认后再点兵组队</span>
      <span class="err-more" id="bp-think-link" style="margin-left:auto">点击看思考</span>
    </div>
    <div class="bp-body" id="bp-body"></div>
    <div class="bp-foot">
      <button class="btn" id="bp-confirm">确认蓝图，开始点兵 →</button>
      <button class="btn ghost" id="bp-cancel">重写一句话</button>
      <span id="bp-hint" style="color:var(--faint);font-size:13px"></span>
    </div>
  </div>

  <div id="team"><div class="workspace">

    <!-- 左栏：点将台 + 作战室动画 -->
    <div class="left-col">
      <div id="left-head">
        <div class="team-head">
          <span class="emoji" id="team-emoji"></span>
          <h2 id="team-name"></h2>
          <span id="save-state"></span>
          <button type="button" id="run-error-link" title="查看本次执行报错">报错信息</button>
        </div>
        <p class="team-summary" id="team-summary"></p>
        <div id="team-main-model"></div>
        <button class="btn ghost" id="btn-secrets" style="margin-top:8px;font-size:12px;padding:4px 10px">🔑 团队凭证 <span id="secrets-count"></span></button>
      </div>
      <div id="board"></div>
      <div class="card" id="runcard">
        <div class="runbar-head">
          <div class="runbar-hint">任务（可修改后再出征）：</div>
          <div class="run-indicators">
            <button type="button" id="danger-chip" title="查看危险操作">危险</button>
            <span class="status orch-status" id="orchestrator-status">将军待命</span>
          </div>
        </div>
        <textarea id="task"></textarea>
        <div class="actions">
          <button class="btn" id="btn-run">出 征</button>
          <button class="btn danger" id="btn-stop" style="display:none">⛔ 停战</button>
          <button class="btn ghost" id="btn-export">导出</button>
          <button class="btn ghost" id="btn-redesign">重新点将</button>
        </div>
      </div>
    </div>

    <!-- 右栏：团队成员与产出 -->
    <div class="right-col">
      <div class="members-head"><span class="t" id="members-head-t">TEAM MEMBERS</span></div>
      <div id="members"></div>
      <button class="btn ghost" id="add-member">＋ 新增成员</button>
    </div>

  </div>

  <!-- 最终交付：横跨整行 -->
  <div class="card" id="final">

<script>
let spec = null;
let META = { tools_enabled: false, tools: [] };
const openEditors = new Set();
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
let redesignThinkingWanted = false;

function normalizeMemberIcon(agent) {
  const name = String(agent?.name || "").trim();
  const match = name.match(/^\s*((?:\p{Extended_Pictographic}(?:️|\p{Emoji_Modifier}|‍\p{Extended_Pictographic})*)+)\s*/u);
  if (match?.[1]) {
    agent.emoji = match[1].trim();
    agent.name = name.slice(match[0].length).trim() || "未命名成员";
  }
  if (!agent.emoji) agent.emoji = "🤖";
}

function outputIcon() {
  return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6 2H2v4M10 2h4v4M6 14H2v-4M10 14h4v-4"/></svg>';
}

function outputUrl(raw) {
  const value = String(raw || "").trim().replace(/^<|>$/g, "");
  if (!value || /^javascript:/i.test(value)) return "#";
  if (/^(https?:|mailto:|blob:|data:image\/|#)/i.test(value) || value.startsWith("/runs/")) return value;
  if (!runWorkDir) return value.startsWith("/") ? "#" : value;
  const work = String(runWorkDir).replace(/\\/g, "/").replace(/\/+$/, "");
  const normalized = value.replace(/\\/g, "/");
  let rel = normalized;
  if (normalized.startsWith(work + "/")) rel = normalized.slice(work.length + 1);
  else if (normalized.startsWith("/")) return "#";
  const parts = rel.split("/").filter((p) => p && p !== ".");
  if (!parts.length || parts.some((p) => p === "..")) return "#";
  const runId = work.split("/").pop();
  return `/runs/${encodeURIComponent(runId)}/${parts.map(encodeURIComponent).join("/")}`;
}

function inlineMarkdown(source) {
  const held = [];
  const hold = (html) => `\u0000${held.push(html) - 1}\u0000`;
  let text = String(source || "");
  text = text.replace(/`([^`\n]+)`/g, (_, code) => hold(`<code>${esc(code)}</code>`));
  // LaTeX 公式：$$...$$ / \[...\] 显示式，\(...\) 行内式。不支持裸 $...$（会和 $BASE_DIR、shell 变量、价格冲突）。
  text = text.replace(/\$\$([^\n]+?)\$\$/g, (_, tex) => hold(`<span class="math" data-display="1" data-tex="${encodeURIComponent(tex)}"></span>`));
  text = text.replace(/\\\[([^\n]+?)\\\]/g, (_, tex) => hold(`<span class="math" data-display="1" data-tex="${encodeURIComponent(tex)}"></span>`));
  text = text.replace(/\\\(([^\n]+?)\\\)/g, (_, tex) => hold(`<span class="math" data-display="0" data-tex="${encodeURIComponent(tex)}"></span>`));
  text = text.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, alt, url) => {
    const src = outputUrl(url);
    return hold(src === "#" ? esc(alt) : `<img src="${esc(src)}" alt="${esc(alt)}" loading="lazy">`);
  });
  text = text.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, label, url) => {
    const href = outputUrl(url);
    if (href === "#") return esc(label);
    const clean = href.split(/[?#]/)[0].toLowerCase();
    if (/\.(mp4|webm|mov)$/.test(clean)) return hold(`<video controls preload="metadata" src="${esc(href)}"></video>`);
    if (/\.(mp3|wav|m4a|ogg)$/.test(clean)) return hold(`<audio controls preload="metadata" src="${esc(href)}"></audio>`);
    if (/\.(svg|webp|gif|png|jpe?g)$/.test(clean)) return hold(`<img src="${esc(href)}" alt="${esc(label)}" loading="lazy">`);
    if (/\.html?$/.test(clean)) return hold(`<span class="embed-html"><iframe src="${esc(href)}" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe><a class="embed-open" href="${esc(href)}" target="_blank" rel="noopener noreferrer">↗ 新窗口打开 ${esc(label)}</a></span>`);
    return hold(`<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`);
  });
  text = esc(text)
    .replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_\n]+)__/g, "<strong>$1</strong>")
    .replace(/~~([^~\n]+)~~/g, "<del>$1</del>")
    .replace(/(^|[\s(])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  return text.replace(/\u0000(\d+)\u0000/g, (_, i) => held[Number(i)] || "");
}

function tableCells(line) {
  return line.trim().replace(/^\||\|$/g, "").split("|").map((v) => v.trim());
}

function renderMarkdown(raw) {
  const lines = String(raw || "").replace(/\r\n?/g, "\n").split("\n");
  const html = [];
  for (let i = 0; i < lines.length;) {
    const line = lines[i];
    if (!line.trim()) { i++; continue; }
    const fence = line.match(/^```([\w-]*)\s*$/);
    if (fence) {
      const code = []; i++;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) code.push(lines[i++]);
      if (i < lines.length) i++;
      if (fence[1] === "mermaid") html.push(`<div class="mermaid-block" data-src="${encodeURIComponent(code.join("\n"))}"></div>`);
      else html.push(`<pre><code${fence[1] ? ` class="language-${esc(fence[1])}"` : ""}>${esc(code.join("\n"))}</code></pre>`);
      continue;
    }
    if (i + 1 < lines.length && line.includes("|") && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i + 1])) {
      const heads = tableCells(line); const rows = []; i += 2;
      while (i < lines.length && lines[i].includes("|") && lines[i].trim()) rows.push(tableCells(lines[i++]));
      html.push(`<table><thead><tr>${heads.map((v) => `<th>${inlineMarkdown(v)}</th>`).join("")}</tr></thead><tbody>${rows.map((r) => `<tr>${heads.map((_, n) => `<td>${inlineMarkdown(r[n] || "")}</td>`).join("")}</tr>`).join("")}</tbody></table>`);
      continue;
    }
    const heading = line.match(/^(#{1,4})\s+(.+)$/);
    if (heading) { const n = heading[1].length; html.push(`<h${n}>${inlineMarkdown(heading[2])}</h${n}>`); i++; continue; }
    if (/^\s*([-*_])(?:\s*\1){2,}\s*$/.test(line)) { html.push("<hr>"); i++; continue; }
    if (/^\s*>\s?/.test(line)) {
      const parts = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) parts.push(lines[i++].replace(/^\s*>\s?/, ""));
      html.push(`<blockquote>${parts.map(inlineMarkdown).join("<br>")}</blockquote>`); continue;
    }
    const unordered = line.match(/^\s*[-+*]\s+(.+)$/);
    const ordered = line.match(/^\s*\d+[.)]\s+(.+)$/);
    if (unordered || ordered) {
      const tag = ordered ? "ol" : "ul", items = [];
      const re = ordered ? /^\s*\d+[.)]\s+(.+)$/ : /^\s*[-+*]\s+(.+)$/;
      while (i < lines.length) { const m = lines[i].match(re); if (!m) break; items.push(m[1]); i++; }
      html.push(`<${tag}>${items.map((v) => `<li>${inlineMarkdown(v)}</li>`).join("")}</${tag}>`); continue;
    }
    const paragraph = [line]; i++;
    while (i < lines.length && lines[i].trim() && !/^(#{1,4})\s+|^```|^\s*>|^\s*[-+*]\s+|^\s*\d+[.)]\s+/.test(lines[i])) paragraph.push(lines[i++]);
    html.push(`<p>${paragraph.map(inlineMarkdown).join("<br>")}</p>`);
  }
  return `<div class="md-render">${html.join("")}</div>`;
}

// ---- mermaid 流程图 + KaTeX 公式：按需懒加载 CDN，失败则降级显示原文 ----
let _mermaidP = null, _katexP = null;
function loadMermaid() {
  if (_mermaidP) return _mermaidP;
  _mermaidP = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
    s.onload = () => { try { window.mermaid.initialize({ startOnLoad: false, theme: "neutral", securityLevel: "strict" }); } catch {} res(window.mermaid); };
    s.onerror = () => rej(new Error("mermaid CDN 加载失败"));
    document.head.appendChild(s);
  });
  return _mermaidP;
}
function loadKatex() {
  if (_katexP) return _katexP;
  _katexP = new Promise((res, rej) => {
    const css = document.createElement("link"); css.rel = "stylesheet"; css.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"; document.head.appendChild(css);
    const s = document.createElement("script"); s.src = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js";
    s.onload = () => res(window.katex); s.onerror = () => rej(new Error("katex CDN 加载失败"));
    document.head.appendChild(s);
  });
  return _katexP;
}
// 在 innerHTML 落地后调用：把 .math 渲成公式、.mermaid-block 渲成图。CDN 挂了就降级成原文。
async function enhanceRichContent(root) {
  if (!root) return;
  const maths = root.querySelectorAll(".math[data-tex]:not([data-rendered])");
  if (maths.length) {
    loadKatex().then((katex) => {
      maths.forEach((el) => {
        el.setAttribute("data-rendered", "1");
        const tex = decodeURIComponent(el.dataset.tex || "");
        try { katex.render(tex, el, { displayMode: el.dataset.display === "1", throwOnError: false }); }
        catch { el.textContent = tex; }
      });
    }).catch(() => maths.forEach((el) => { el.setAttribute("data-rendered", "1"); el.textContent = decodeURIComponent(el.dataset.tex || ""); }));
  }
  const blocks = root.querySelectorAll(".mermaid-block[data-src]:not([data-rendered])");
  if (blocks.length) {
    loadMermaid().then(async (mermaid) => {
      for (const el of blocks) {
        el.setAttribute("data-rendered", "1");
        const src = decodeURIComponent(el.dataset.src || "");
        try { const { svg } = await mermaid.render("mmd-" + Math.random().toString(36).slice(2), src); el.innerHTML = svg; }
        catch { el.innerHTML = `<pre><code>${esc(src)}</code></pre>`; }
      }
    }).catch(() => blocks.forEach((el) => { el.setAttribute("data-rendered", "1"); el.innerHTML = `<pre><code>${esc(decodeURIComponent(el.dataset.src || ""))}</code></pre>`; }));
  }
}

function renderOutput(el, raw) {
  if (!el) return;
  el.dataset.raw = String(raw || "");
  el.innerHTML = renderMarkdown(raw);
  enhanceRichContent(el);
}

function renderOriginalHistoryInto(el, memberId) {
  if (!el) return;
  const calls = memberOutputHistory[memberId] || [];
  const entries = [];
  for (const call of calls) {
    const segments = call.segments?.length ? call.segments : (call.live ? [call.live] : []);
    segments.forEach((raw, segmentIndex) => {
      entries.push({
        raw: String(raw || ""),
        label: `第 ${call.callIndex} 次出战 · 原文${segments.length > 1 ? ` ${segmentIndex + 1}` : ""}`,
      });
    });
  }
  if (!entries.length && runOutputs[memberId]) {
    entries.push({ raw: String(runOutputs[memberId]), label: "本轮输出原文" });
  }
  el.dataset.raw = entries.map((entry) => entry.raw).join("\n\n");
  el.innerHTML = entries.length
    ? entries.map((entry) => `<section class="original-segment"><div class="original-label">${esc(entry.label)}</div>${renderMarkdown(entry.raw)}</section>`).join("")
    : renderMarkdown("（尚未输出正文）");
  enhanceRichContent(el);
}

function renderMemberOriginals(memberId) {

}

function openOutputModal(targetId, title) {
  const source = $(targetId);
  if (!source) return;
  const mask = document.createElement("div");
  mask.className = "modal-mask";
  mask.innerHTML = `<div class="modal output-modal">
    <div class="modal-head"><h3>${esc(title || "成员交付")}</h3><button class="x" data-close>✕</button></div>
    <div class="modal-body" id="output-modal-body"></div>
  </div>`;
  document.body.appendChild(mask);
  const memberId = targetId.startsWith("out-") ? targetId.slice(4) : "";
  if (memberId && memberOutputHistory[memberId]?.length) renderOriginalHistoryInto(mask.querySelector("#output-modal-body"), memberId);
  else renderOutput(mask.querySelector("#output-modal-body"), source.dataset.raw || "");
  const close = () => mask.remove();
  mask.addEventListener("click", (e) => { if (e.target === mask || e.target.dataset.close !== undefined) close(); });
}
function openTextModal(title, raw) {
  const mask = document.createElement("div");
  mask.className = "modal-mask";
  mask.innerHTML = `<div class="modal output-modal">
    <div class="modal-head"><h3>${esc(title || "详情")}</h3><button class="x" data-close>✕</button></div>
    <div class="modal-body" id="text-modal-body"></div>
  </div>`;
  document.body.appendChild(mask);
  renderOutput(mask.querySelector("#text-modal-body"), raw || "（无内容）");
  const close = () => mask.remove();
  mask.addEventListener("click", (e) => { if (e.target === mask || e.target.dataset.close !== undefined) close(); });
}

let errHideTimer = null;
function showError(msg) {
  const e = $("error");
  if (errHideTimer) { clearTimeout(errHideTimer); errHideTimer = null; }
  if (!msg) { e.style.display = "none"; e.innerHTML = ""; return; }
  e.textContent = String(msg);
  e.style.display = "block";
  e.title = "点击关闭";
  e.onclick = () => showError("");
  errHideTimer = setTimeout(() => showError(""), 6000); // 顶部提示，6 秒后自动消失，点击也可关
}

function dedupeDangerOps(list = []) {
  const seen = new Set();
  return list.filter((op) => {

    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

function memberRisk(a = {}) {
  const raw = a.risk && typeof a.risk === "object" && !Array.isArray(a.risk) ? a.risk : {};
  const operations = Array.isArray(raw.operations)
    ? raw.operations.map((x) => String(x || "").trim()).filter(Boolean).slice(0, 5)
    : [];

  return String(raw.level || "").toLowerCase() === "danger" && (summary || operations.length)
    ? { summary: summary || operations[0] || "包含高危操作", operations }
    : null;
}
function memberRiskButton(a = {}) {

    : "";

function createdTimeFromId(id) {
  const raw = String(id || "");
  if (!/^t[a-z0-9]+$/.test(raw)) return 0;
  const n = parseInt(raw.slice(1), 36);
  return Number.isFinite(n) && n > 946684800000 && n < 4102444800000 ? n : 0;
}
function teamTimeValue(t) {
  const created = Date.parse(t.created_at || "") || createdTimeFromId(t.id);
  const updated = Date.parse(t.updated_at || "");
  return created || updated || 0;
}
function formatTeamTime(t) {
  const ms = teamTimeValue(t);
  if (!ms) return "时间未知";
  const d = new Date(ms);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${y}-${m}-${day} ${hh}:${mm}`;
}
function sortedTeams(list) {
  return [...(list || [])].sort((a, b) => teamTimeValue(b) - teamTimeValue(a));
}
function teamOriginLabel(origin = {}) {
  const mode = String(origin.mode || "").toLowerCase();
  if (mode === "mixed") return "文字点将 + Skill 导入";
  if (mode === "skill") return "Skill 导入";
  if (mode === "text") return "文字点将";
  return "来源未知";
}
function teamOriginDetail(t = {}) {
  const origin = t.origin || {};
  const paths = Array.isArray(origin.skill_paths) ? origin.skill_paths.filter(Boolean) : [];
  const text = String(origin.text || "").trim();
  const lines = [`来源：${teamOriginLabel(origin)}`];
  if (paths.length) {
    lines.push("", "Skill 路径：", ...paths.map((p) => `- ${p}`));
  }
  if (text) {
    lines.push("", "文字输入：", text);
  }
  if (!paths.length && !text) {
    lines.push("", "这个团队是较早创建的记录，暂时没有保存来源详情。");
  }
  return lines.join("\n");
}
function teamMemberIconsHtml(t = {}) {

    `<span class="team-member-icon" data-tip="${esc(a.name)}" data-tip-kind="member" aria-label="${esc(a.name)}">${esc(a.emoji || "🤖")}</span>`

function teamCardHtml(t, mode = "team") {

  const status = mode === "history" ? "成功" : `${agentCount} 名成员`;

  return `<div class="team-card${memberIconsHtml ? " has-members" : ""}" role="button" tabindex="0" data-open-team="${esc(t.id)}" aria-label="打开团队 ${esc(name)}">

    </span>

  </div>`;

function ensureTeamHoverTip() {

function pointFromEvent(e, anchor) {

    return { x: e.clientX, y: e.clientY };

  let top = point.y - th - 12;
  if (top < margin) top = point.y + 18;
  left = Math.max(margin, Math.min(left, vw - tw - margin));
  top = Math.max(margin, Math.min(top, vh - th - margin));
  tip.style.left = `${Math.round(left)}px`;
  tip.style.top = `${Math.round(top)}px`;
}

}

// 侧栏左右拖拽调宽：最小宽度 = 初始宽度 260px，最大不超过半屏；记住上次宽度。
(function setupSidebarResize() {
  const shell = document.querySelector(".app-shell");
  const handle = $("side-resizer");
  if (!shell || !handle) return;
  const MIN = 260; // 初始化宽度即最小宽度
  const maxW = () => Math.max(MIN, Math.round(window.innerWidth * 0.5));
  const apply = (w) => shell.style.setProperty("--side-w-expanded", Math.max(MIN, Math.min(maxW(), w)) + "px");
  const saved = parseInt(localStorage.getItem("sideW") || "", 10);
  if (saved && saved > MIN) apply(saved);
  let dragging = false;
  handle.addEventListener("pointerdown", (e) => {
    dragging = true;
    handle.classList.add("dragging");
    shell.classList.add("side-resizing");
    try { handle.setPointerCapture(e.pointerId); } catch {}
    document.body.style.userSelect = "none";
    e.preventDefault();
  });
  window.addEventListener("pointermove", (e) => { if (dragging) apply(e.clientX); });
  window.addEventListener("pointerup", () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove("dragging");
    shell.classList.remove("side-resizing");
    document.body.style.userSelect = "";
    const w = parseInt(getComputedStyle(shell).getPropertyValue("--side-w-expanded"), 10) || MIN;
    localStorage.setItem("sideW", String(w));
  });
})();

async function runDesign(payload, lastTask) {
  showError("");
  const btn = $("btn-design");
  const oldBtnHtml = btn.innerHTML;
  btn.disabled = true;
  $("design-hint").innerHTML = '军师思考中… <span class="err-more" id="design-think-link">点击看思考</span>';
  resetThink("__design__");
  const link = $("design-think-link"); if (link) link.onclick = () => openThink("__design__");
  const shouldShowThink = redesignThinkingWanted || ($("team")?.style.display !== "none" && !!spec);
  if (shouldShowThink) openThink("__design__");
  try {
    const r = await fetch("/api/design", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: $("design-model")?.value || "", ...payload }),
    });
    if (!r.body) { const d = await r.json().catch(() => ({})); throw new Error(d.error || "生成失败"); }
    const reader = r.body.getReader(); const dec = new TextDecoder();
    let buf = "", finalSpec = null, errMsg = null;
    while (true) {
      const { value, done } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i); buf = buf.slice(i + 2);
        if (!line.startsWith("data: ")) continue;
        const ev = JSON.parse(line.slice(6));
        if (ev.type === "agent_thinking") pushThink("__design__", ev.text);
        else if (ev.type === "design_done") finalSpec = ev.spec;
        else if (ev.type === "error") errMsg = ev.message;
      }
    }
    if (errMsg) throw new Error(errMsg);
    if (!finalSpec || !Array.isArray(finalSpec.agents) || !finalSpec.agents.length) throw new Error("没有生成有效的团队，请重试。");
    finalSpec.agents.forEach((a) => { if (!Array.isArray(a.depends_on)) a.depends_on = []; });
    finalSpec.last_task = lastTask || "";
    finalSpec.origin = finalSpec.origin || localTeamOriginFromPayload(payload, lastTask);
    resetRunState();
    spec = finalSpec;
    activeSpecSource = "team";
    clearHistorySelection();
    renderTeam();
    autoSave(true);
    clearImportedSkillCache();
    redesignThinkingWanted = false;
  } catch (e) { showError(e.message); }
  finally { btn.disabled = false; btn.innerHTML = oldBtnHtml || "↑"; $("design-hint").textContent = ""; }
}

  runBlueprint(description);
});

let currentBlueprint = null;     // 当前蓝图（含用户在面板里的选择）

// 点将/点兵阶段的 SSE 事件：思考流 + 军师 ask_user 追问（用同一个思考对话框弹窗）
function handleDesignEvent(ev) {
  if (ev.type === "agent_thinking") { pushThink("__design__", ev.text); return; }
  if (ev.type === "ask_user") {
    const askId = ev.agent || ev.id;
    if (pendingAsk[askId] && pendingAsk[askId].qid === ev.qid) return;
    if (ev.qid && resolvedAskQids.has(ev.qid)) {
      addAskToChat(askId, { qid: ev.qid, question: ev.question });
      markThinkable(askId);
      return;
    }
    pendingAsk[askId] = { qid: ev.qid, question: ev.question };
    addAskToChat(askId, pendingAsk[askId]);
    openThink(askId, { requiresAction: true });
    return;
  }
  if (ev.type === "ask_resolved") {
    if (ev.qid) resolvedAskQids.add(ev.qid);
    delete pendingAsk[ev.agent || ev.id];
    refreshAskReopen();
    return;
  }
}

// 通用 SSE 读取：onEvent 处理每条事件；pick 返回非 null 即为最终结果；error 事件抛出
async function streamSSE(url, body, onEvent, pick) {
  const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.body) { const d = await r.json().catch(() => ({})); throw new Error(d.error || "请求失败"); }
  const reader = r.body.getReader(), dec = new TextDecoder();
  let buf = "", result = null, errMsg = null;
  while (true) {
    const { value, done } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf("\n\n")) >= 0) {
      const line = buf.slice(0, i); buf = buf.slice(i + 2);
      if (!line.startsWith("data: ")) continue;
      const ev = JSON.parse(line.slice(6));
      if (ev.type === "error") { errMsg = ev.message; continue; }
      onEvent && onEvent(ev);
      const got = pick && pick(ev);
      if (got != null) result = got;
    }
  }
  if (errMsg) throw new Error(errMsg);
  return result;
}

  if (item.kind === "folder") {
    return {
      chars: item.files.reduce((n, f) => n + f.content.length, 0),
      files: item.files.length,
    };
  }
  return { chars: item.content.length, files: 1 };
}

  return importedSkills.flatMap((item) =>

  const text = cleanOriginInputText(payload.description || fallbackText || "");

  return {
    source: "design_input",

      return `${esc(item.name)}(${item.kind === "folder" ? `${stat.files}个文件，` : ""}${stat.chars}字)`;
    }).join("、") : "")
      + (skipped ? `　·　跳过 ${skipped} 个非文本文件` : "");
  };
  refresh();
  const addFiles = async (fileList, useRelPath) => {
    if (!useRelPath) {
      for (const f of fileList) {
        try { imported.push({ kind: "file", name: f.name, content: await f.text() }); } catch { skipped++; }
      }
      refresh();
      return;
    }
    const folders = new Map();
    for (const f of fileList) {
      const rel = f.webkitRelativePath || f.name;
      if (!TEXT_RE.test(rel)) { skipped++; continue; }
      const parts = rel.split("/").filter(Boolean);
      const folderName = parts.length > 1 ? parts[0] : "所选文件夹";
      if (!folders.has(folderName)) folders.set(folderName, []);
      try { folders.get(folderName).push({ name: rel, content: await f.text() }); } catch { skipped++; }
    }
    for (const [name, files] of folders) {
      if (!files.length) continue;
      const item = { kind: "folder", name, files };
      const existing = imported.findIndex((x) => x.kind === "folder" && x.name === name);
      if (existing >= 0) imported[existing] = item;
      else imported.push(item);
    }
    refresh();
  };
  mask.querySelector("#sk-files").addEventListener("change", (e) => addFiles(e.target.files, false));
  mask.querySelector("#sk-folder").addEventListener("change", async (e) => {
    const files = [...e.target.files];
    await addFiles(files, true);
    e.target.value = ""; // 允许继续选择更多文件夹，也允许重新选择同一个文件夹
  });
  mask.querySelector("[data-save]").addEventListener("click", () => {
    const paste = mask.querySelector("#sk-paste").value.trim();
    if (paste) imported.push({ kind: "paste", name: "粘贴内容", content: paste });
    importedSkills = imported;        // 保存到外部状态
    renderImportedSkills();           // 在点将界面显示
    close();                          // 关闭窗口
  });
  document.addEventListener("keydown", function e3(ev) { if (ev.key === "Escape") { close(); document.removeEventListener("keydown", e3); } });
}

/* ============ 拓扑分层 ============ */
function topoWaves(agents) {
  const indeg = new Map(agents.map((a) => [a.id, a.depends_on.filter((d) => agents.some((x) => x.id === d)).length]));
  const waves = []; let left = agents.length;
  while (left > 0) {
    const wave = agents.filter((a) => indeg.get(a.id) === 0);
    if (!wave.length) return null; // 有环
    wave.forEach((a) => indeg.set(a.id, -1));
    agents.forEach((a) => {
      if (indeg.get(a.id) < 0) return;
      const hit = a.depends_on.filter((d) => wave.some((w) => w.id === d)).length;
      if (hit) indeg.set(a.id, indeg.get(a.id) - hit);
    });
    waves.push(wave); left -= wave.length;
  }
  return waves;
}

/* ===== 左右动态对齐 =====
   方向一（右长左短）：作战室行高在 96~176 间伸缩去贴右栏；
   方向二（左长右短）：成员网格拉伸（minHeight + 等分行高）补齐到左栏高度。 */
function balancedRowH(waveCount) {
  const right = document.querySelector(".right-col")?.offsetHeight || 0;
  const head = $("left-head")?.offsetHeight || 0;
  const run = $("runcard")?.offsetHeight || 0;
  const avail = right - head - run - 32 /*列间 gap*/ - 36 /*board 上下留白*/;
  return Math.max(96, Math.min(176, Math.floor(avail / Math.max(1, waveCount))));
}
function balanceColumns() {
  if (!lastWaves) return;
  const m = $("members");
  if (m) { m.style.minHeight = ""; m.classList.remove("fill"); }
  renderBoard(lastWaves, balancedRowH(lastWaves.length));
  requestAnimationFrame(() => {
    if (!m) return;
    const left = document.querySelector(".left-col")?.offsetHeight || 0;
    const right = document.querySelector(".right-col")?.offsetHeight || 0;
    if (right < left - 8) {
      m.style.minHeight = (m.offsetHeight + (left - right)) + "px";
      m.classList.add("fill");
    }
  });
}

/* —— 作战室：纵向层级（上 = 前线，下 = 收尾） —— */
let nodePos = {};
let boardW = 440, boardH = 0;
// 运行时 DAG：出征中按将军的实际路由画连线（成员仍全部显示），结束/重开团队恢复初始 DAG
let runtimeMode = false;
const runtimeEdges = new Set(); // "from->to"
// 当前该画哪些连线：运行时=实际观察到的路由；否则=初始 depends_on
function edgePairs() {
  if (runtimeMode) return [...runtimeEdges].map((s) => s.split("->"));
  return spec.agents.flatMap((a) => (a.depends_on || []).map((d) => [d, a.id]));
}
function buildEdgeSvg() {
  let svg = `<svg viewBox="0 0 ${boardW} ${boardH}" preserveAspectRatio="none">`;
  for (const [d, id] of edgePairs()) {
    const from = nodePos[d], to = nodePos[id];
    if (!from || !to) continue;
    const dy = Math.max(24, (to.y - from.y) * 0.4);
    svg += `<path class="edge" id="edge-${esc(d)}-${esc(id)}" d="M ${from.x} ${from.y + 26} C ${from.x} ${from.y + 26 + dy}, ${to.x} ${to.y - 26 - dy}, ${to.x} ${to.y - 26}"/>`;
  }
  return svg + "</svg>";
}
// 只换连线层，保留节点/悬浮卡，避免重绘整块打断动画与气泡
function refreshBoardEdges() {
  const old = $("board")?.querySelector("svg");
  if (old) old.outerHTML = buildEdgeSvg();
}
function renderBoard(waves, rowH = 128) {
  const board = $("board");
  const W = board.clientWidth || 440;
  const H = waves.length * rowH + 36;
  board.style.height = H + "px";
  boardW = W; boardH = H;
  nodePos = {};
  waves.forEach((wave, wi) => {
    const colW = W / wave.length;
    wave.forEach((a, ci) => {
      nodePos[a.id] = { x: colW * ci + colW / 2, y: rowH * wi + rowH / 2 + 10 };
    });
  });

  let svg = buildEdgeSvg();

  let nodes = "";
  waves.forEach((wave, wi) => {
    const tag = wi === 0 ? "前线" : (wi === waves.length - 1 && waves.length > 1 ? "收尾" : `第 ${wi + 1} 层`);
    nodes += `<div class="wave-tag" style="top:${wi * rowH + 8}px">${tag}</div>`;
  });
  // 名字按所在层级上色（前线/中层/收尾各一色），一眼区分梯队
  const sid = sinkId();
  const palette = ["#7ab8ff", "#ed9a4d", "#6fd08c", "#d88bd8", "#7fd0c0"];
  const layerColor = {};
  waves.forEach((wave, wi) => wave.forEach((a) => { layerColor[a.id] = a.id === sid ? "#c3b0ff" : palette[wi % palette.length]; }));
  for (const a of spec.agents) {
    const p = nodePos[a.id];
    const st = agentState[a.id] || "";
    nodes += `
    <div class="node ${st}" id="node-${esc(a.id)}" style="left:${p.x}px;top:${p.y - 25}px" data-jump="${esc(a.id)}">
      <div class="bubble" id="bubble-${esc(a.id)}"></div>
      <div class="avatar">${esc(a.emoji || "🤖")}</div>
      <div class="node-name" style="color:${layerColor[a.id] || "var(--dim)"}">${esc(a.name)}</div>
    </div>`;
  }
  board.innerHTML = svg + nodes;
  const agentById = new Map(spec.agents.map((a) => [a.id, a]));
  board.querySelectorAll("[data-jump]").forEach((n) => {
    n.addEventListener("click", () => $(`agent-${n.dataset.jump}`)?.scrollIntoView({ behavior: "smooth", block: "center" }));
    n.addEventListener("mouseenter", (e) => {
      const agent = agentById.get(n.dataset.jump);
      if (agent) scheduleTeamHoverTip(n, e, { html: memberDetailHtml(agent), kind: "dag" });
    });
    n.addEventListener("mousemove", (e) => moveTeamHoverTip(n, e));
    n.addEventListener("mouseleave", (e) => leaveTeamHoverTip(n, e.relatedTarget));
  });
}

      autoSave();

      if (el.dataset.f === "role") {
        const r = $(`agent-${a.id}`)?.querySelector(".agent-role");
        if (r) r.textContent = el.value;
      }
      if (el.dataset.f === "model") {
        // 同步卡片上的快速下拉（自定义模型不在候选里则补一个 option）
        const sel = $(`agent-${a.id}`)?.querySelector(".model-sel");
        if (sel) {
          if (el.value && !Array.from(sel.options).some((o) => o.value === el.value))
            sel.add(new Option(el.value, el.value));
          sel.value = el.value;
          sel.classList.toggle("custom", !!el.value);
        }
      }
      autoSave();
    };
    el.addEventListener("input", onFieldChange);
    el.addEventListener("change", onFieldChange);
  });
  host.querySelectorAll("[data-dep]").forEach((cb) => {
    cb.addEventListener("change", () => {
      const a = spec.agents.find((x) => x.id === cb.dataset.id);
      if (!a) return;
      const set = new Set(a.depends_on);
      cb.checked ? set.add(cb.dataset.dep) : set.delete(cb.dataset.dep);
      a.depends_on = [...set];
      renderAll(); autoSave();
    });
  });
  host.querySelectorAll("[data-tool]").forEach((cb) => {
    cb.addEventListener("change", () => {
      const a = spec.agents.find((x) => x.id === cb.dataset.id);
      if (!a) return;
      const set = new Set(a.tools || []);
      cb.checked ? set.add(cb.dataset.tool) : set.delete(cb.dataset.tool);
      a.tools = [...set];
      renderAll(); autoSave();
    });
  });
  host.querySelectorAll("[data-model-pick]").forEach((sel) => {
    sel.addEventListener("change", () => {
      const a = spec.agents.find((x) => x.id === sel.dataset.id);
      if (!a) return;
      a.model = sel.value;
      sel.classList.toggle("custom", !!sel.value);

      const inp = $(`agent-${a.id}`)?.querySelector('[data-f="model"]');

  host.querySelectorAll("[data-del-member]").forEach((b) => {
    b.addEventListener("click", () => {
      const id = b.dataset.delMember;

      spec.agents = spec.agents.filter((x) => x.id !== id);
      spec.agents.forEach((x) => (x.depends_on = x.depends_on.filter((d) => d !== id)));
      openEditors.delete(id);

  host.querySelectorAll("details.editor").forEach((d) => {
    d.addEventListener("toggle", () => {
      d.open ? openEditors.add(d.dataset.id) : openEditors.delete(d.dataset.id);

      requestAnimationFrame(balanceColumns);

  host.querySelectorAll("[data-edit]").forEach((b) => {
    b.addEventListener("click", () => {
      const det = host.querySelector(`details.editor[data-id="${b.dataset.edit}"]`);
      if (det) det.open = !det.open;

  host.querySelectorAll("[data-done]").forEach((b) => {
    b.addEventListener("click", () => {
      const det = host.querySelector(`details.editor[data-id="${b.dataset.done}"]`);
      if (det) det.open = false;
    });
  });
  host.querySelectorAll("[data-aiedit]").forEach((b) => {
    b.addEventListener("click", () => aiEditMember(b.dataset.aiedit));
  });
}

async function aiEditMember(id) {
  const a = spec.agents.find((x) => x.id === id);
  const inp = $(`agent-${id}`)?.querySelector(".ai-edit-input");
  const msg = $(`aimsg-${id}`);
  if (!a || !inp) return;
  const instruction = inp.value.trim();

  if (msg) msg.textContent = "🧠 用本成员模型修改中…";
  try {
    const r = await fetch("/api/edit-member", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ agent: a, instruction, team_main_model: spec.main_model || "" }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "修改失败");
    const f = d.fields || {};
    ["name", "emoji", "role", "persona", "system_prompt"].forEach((k) => { if (f[k] != null) a[k] = String(f[k]); });
    if (Array.isArray(f.tools)) a.tools = f.tools.filter((t) => ["shell", "write_file", "read_file"].includes(t));
    inp.value = "";
    renderAll(); autoSave();
    const det = $(`agent-${id}`)?.querySelector("details.editor"); if (det) det.open = true;
    const m2 = $(`aimsg-${id}`); if (m2) m2.textContent = "✓ 已改（" + (d.model || "") + "）：" + (f._changed || "见上方字段");
  } catch (e) { if ($(`aimsg-${id}`)) $(`aimsg-${id}`).textContent = "⚠ " + e.message; }
}

let queuedAutoFocus = null;

["pointerdown", "pointermove", "keydown", "wheel", "touchstart", "input"].forEach((eventName) => {

function requestIdleAutoFocus(target, options = {}) {
  const el = typeof target === "string" ? $(target) : target;
  if (!el) return;
  queuedAutoFocus = { el, options: { behavior: "smooth", block: "center", ...options } };
  const wait = Math.max(0, AUTO_FOCUS_IDLE_MS - (Date.now() - lastUserInteractionAt));
  if (autoFocusTimer) clearTimeout(autoFocusTimer);
  autoFocusTimer = setTimeout(() => {
    autoFocusTimer = null;
    if (!queuedAutoFocus) return;
    const idleFor = Date.now() - lastUserInteractionAt;
    if (idleFor < AUTO_FOCUS_IDLE_MS) {
      requestIdleAutoFocus(queuedAutoFocus.el, queuedAutoFocus.options);
      return;
    }
    const { el: targetEl, options: scrollOptions } = queuedAutoFocus;
    queuedAutoFocus = null;
    targetEl.scrollIntoView(scrollOptions);
  }, wait);
}
function playChargeSfx() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    chargeAudioCtx = chargeAudioCtx || new AudioCtx();
    const ctx = chargeAudioCtx;
    if (ctx.state === "suspended") ctx.resume();
    const t0 = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, t0);
    master.gain.exponentialRampToValueAtTime(0.42, t0 + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.2);
    // 总线压一道，霸气但不爆音
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 18; comp.ratio.value = 8; comp.attack.value = 0.003; comp.release.value = 0.25;
    master.connect(comp).connect(ctx.destination);

    // 厚号角：两支微失谐锯齿 + 低通 → 像铜管而非刺耳锯齿；可上行滑音
    const horn = (offset, f1, f2, dur, gain) => {
      const filt = ctx.createBiquadFilter();
      filt.type = "lowpass"; filt.frequency.setValueAtTime(1300, t0 + offset);
      filt.frequency.exponentialRampToValueAtTime(2600, t0 + offset + dur * 0.5);
      filt.Q.value = 0.8;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t0 + offset);
      g.gain.exponentialRampToValueAtTime(gain, t0 + offset + 0.05);
      g.gain.setValueAtTime(gain, t0 + offset + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + offset + dur);
      filt.connect(g).connect(master);
      [-7, 7].forEach((cents) => {
        const osc = ctx.createOscillator();
        osc.type = "sawtooth"; osc.detune.value = cents;
        osc.frequency.setValueAtTime(f1, t0 + offset);
        osc.frequency.exponentialRampToValueAtTime(f2, t0 + offset + dur);
        osc.connect(filt);
        osc.start(t0 + offset); osc.stop(t0 + offset + dur + 0.05);
      });
      // 低八度垫底，更厚重
      const sub = ctx.createOscillator(); const sg = ctx.createGain();
      sub.type = "triangle"; sub.frequency.setValueAtTime(f1 / 2, t0 + offset);
      sub.frequency.exponentialRampToValueAtTime(f2 / 2, t0 + offset + dur);
      sg.gain.setValueAtTime(0.0001, t0 + offset);
      sg.gain.exponentialRampToValueAtTime(gain * 0.7, t0 + offset + 0.05);
      sg.gain.exponentialRampToValueAtTime(0.0001, t0 + offset + dur);
      sub.connect(sg).connect(master);
      sub.start(t0 + offset); sub.stop(t0 + offset + dur + 0.05);
    };

    // 战鼓重击：低频砰 + 一丝噪声拍头
    const drum = (offset, freq, gain, dur = 0.16) => {
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq * 2.2, t0 + offset);
      osc.frequency.exponentialRampToValueAtTime(freq, t0 + offset + 0.05);
      g.gain.setValueAtTime(gain, t0 + offset);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + offset + dur);
      osc.connect(g).connect(master);
      osc.start(t0 + offset); osc.stop(t0 + offset + dur + 0.02);
      const nb = ctx.createBufferSource();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      nb.buffer = buf; const ng = ctx.createGain(); ng.gain.value = gain * 0.5;
      nb.connect(ng).connect(master); nb.start(t0 + offset);
    };

    // 开场一记重锤
    drum(0, 60, 0.95, 0.32);
    // 号角上行齐鸣（低八度，雄浑），最后落在持续的高音
    horn(0.08, 110, 165, 0.5, 0.3);   // A2 → E3
    horn(0.40, 165, 220, 0.5, 0.3);   // E3 → A3
    horn(0.78, 220, 330, 1.05, 0.34); // A3 → E4，拖长收尾
    // 加速战鼓，推到收尾的总攻
    [0.1, 0.30, 0.48, 0.62, 0.74, 0.84, 0.92].forEach((off, i, a) => drum(off, 55, 0.4 + 0.55 * (i / (a.length - 1)), 0.14));
    drum(1.0, 48, 1.0, 0.4); // 总攻定音
  } catch {}
}

// attach 到某次运行的事件流：先回放已有事件，运行中则继续实时推送。
// 用 AbortController，切团队/重连时只断开本地连接，服务端运行不受影响。
let runAbort = null;
let openRunSeq = 0;
async function attachRun(runId, opts = {}) {
  if (runAbort) { runAbort.abort(); runAbort = null; }
  attachedRunReplayOnly = !!opts.replayOnly;
  // liveOnly（续聊增量）：不清屏、不整段回放，只接新一轮事件并实时追加到现有对话 → 不闪屏、消息不丢、输出不接到旧的后面。
  streamReplaying = !opts.liveOnly;
  const openSeq = Number(opts.openSeq || 0);
  const ac = new AbortController();
  runAbort = ac;
  try {
    const r = await fetch(`/api/runs/${runId}/stream${opts.liveOnly ? "?live=1" : ""}`, { signal: ac.signal, cache: "no-store" });
    if (!r.ok) throw new Error("无法连接运行流");
    const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = "";
    while (true) {
      if (openSeq && openSeq !== openRunSeq) { ac.abort(); return; }
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, idx).trim(); buf = buf.slice(idx + 2);
        if (!line.startsWith("data: ")) continue;
        if (openSeq && openSeq !== openRunSeq) return;
        try { handleEvent(JSON.parse(line.slice(6))); } catch {}
      }
    }
  } catch (e) {
    if (e.name !== "AbortError" && (!openSeq || openSeq === openRunSeq)) showError(e.message);
  } finally {
    if (runAbort === ac) runAbort = null;
    if (!openSeq || openSeq === openRunSeq) loadRunsSidebar();
  }
}

// 打开某次运行（运行中=重连续看，历史=回放）：先按记录里的 spec 渲染团队，再 attach 回放/实时
async function openRun(runId) {
  const seq = ++openRunSeq;
  if (runAbort) { runAbort.abort(); runAbort = null; }
  try {
    const rec = await (await fetch(`/api/runs/${runId}`, { cache: "no-store" })).json();
    if (seq !== openRunSeq) return;
    if (rec.error || !rec.spec) throw new Error(rec.error || "运行记录不完整");
    resetRunState();
    if (seq !== openRunSeq) return;
    rememberResolvedAsks(rec.events || []);
    spec = rec.spec;
    activeSpecSource = "run";
    currentRunId = runId;
    currentRunStatus = rec.status || "";
    attachedRunReplayOnly = currentRunStatus !== "running";
    highlightActiveRun(runId); // 立刻高亮选中（尤其运行中的记录，其流常开，等不到 loadRunsSidebar）
    $("blueprint") && hideBlueprint();
    $("team").style.display = "";
    renderTeam();
    $("task").value = rec.task || spec.last_task || "";
    resetRuntimeDanger();
    window.scrollTo({ top: 0, behavior: "smooth" });
    attachRun(runId, { replayOnly: currentRunStatus !== "running", openSeq: seq }); // /stream 会先回放全部事件，运行中再转实时
  } catch (e) {
    if (seq === openRunSeq) showError(e.message);
  }
}

async function rerunRun(runId) {

function beginRenameRun(el) {
